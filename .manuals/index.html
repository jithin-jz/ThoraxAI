            Hospitals require fast, secure, HIPAA-compliant access. Doctors can register biometrics (Face ID, Touch ID, or fingerprint). 
            Passkeys use WebAuthn credentials to authenticate. The server stores the public key, issues cryptographic challenges, and verifies browser assertions to grant JWT tokens.
          </p>

          <h3 class="text-sm font-bold uppercase tracking-wider text-ash mb-3">Secure Cross-Origin Redirection</h3>
          <p class="text-sm leading-relaxed mb-6 font-medium text-body">
            Because browser <code>localStorage</code> is sandboxed per origin, when a user logs in on the main domain (e.g. <code>localhost:5173</code>) and is redirected to their subdomain (e.g. <code>hospital.localhost:5173</code>), the token is lost.
            <br><br>
            To prevent this, the client safely forwards the access and refresh tokens via query parameters on redirect (<code>/login?token=...&refresh_token=...</code>). The target portal captures the parameters on load, writes them into the subdomain's <code>localStorage</code>, immediately clears the URL queries, and activates the dashboard session.
          </p>

    // Tab Switching Logic
    function switchTab(tabId) {
      // Deactivate all tabs
      Object.keys(manuals).forEach(id => {
        const btn = document.getElementById(`tab-${id}`);
        if (btn) {
          btn.className = "w-full text-left px-3 py-2 rounded-md text-xs font-bold transition-all flex items-center gap-2.5 text-mute hover:bg-surface-card/50 hover:text-ink";
        }
      });

      // Activate active tab button
      const activeBtn = document.getElementById(`tab-${tabId}`);
      if (activeBtn) {
        activeBtn.className = "w-full text-left px-3 py-2 rounded-md text-xs font-bold transition-all flex items-center gap-2.5 bg-surface-card text-primary";
      }

      // Load content
      const contentDiv = document.getElementById("content");
      const manual = manuals[tabId];
      if (manual && contentDiv) {
        contentDiv.innerHTML = `
          <div>
            <h1 class="text-2xl sm:text-[32px] font-bold text-ink tracking-[-1.2px] leading-none mb-1.5">${manual.title}</h1>
            <p class="text-sm text-mute font-medium">${manual.subtitle}</p>
          </div>
          <div class="h-[1px] bg-hairline-soft"></div>
          <div class="space-y-6">
            ${manual.content}
          </div>
        `;
      }

      // Close mobile sidebar if open
      document.getElementById("sidebar").classList.add("hidden");
    }

    // Initialize Page with Project Overview tab
    document.addEventListener("DOMContentLoaded", () => {
      switchTab("project_overview");

      // Mobile Menu Trigger Controls
      const menuBtn = document.getElementById("menu-btn");
      const closeBtn = document.getElementById("close-btn");
      const sidebar = document.getElementById("sidebar");

      if (menuBtn && sidebar) {
        menuBtn.addEventListener("click", () => {
          sidebar.classList.remove("hidden");
          sidebar.classList.add("fixed");
        });
      }

      if (closeBtn && sidebar) {
        closeBtn.addEventListener("click", () => {
          sidebar.classList.add("hidden");
        });
      }
    });
  </script>
