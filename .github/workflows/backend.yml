# Triggered on backend changes
name: Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  workflow_dispatch:

env:
  PROJECT_ID: thorax-ai-analyzer
  REGION: asia-south1
  SERVICE_NAME: thoraxai-backend
  GAR_REPO: thoraxai-backend-repo
  IMAGE_NAME: backend

jobs:
  deploy:
    name: Build, Push and Deploy Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.IMAGE_NAME }}"
          docker build \
            -t $IMAGE_TAG:${{ github.sha }} \
            -t $IMAGE_TAG:latest \
            ./backend
          docker push $IMAGE_TAG:${{ github.sha }}
          docker push $IMAGE_TAG:latest

      - name: Deploy to GCP Cloud Run
        run: |
          IMAGE_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.IMAGE_NAME }}"
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image $IMAGE_TAG:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --update-env-vars BASE_DOMAIN=thoraxai.web.app,ORIGIN=https://thoraxai.web.app,RP_ID=thoraxai.web.app,TENANT_URL_SCHEME=https \
            --remove-env-vars TENANT_URL_PORT
